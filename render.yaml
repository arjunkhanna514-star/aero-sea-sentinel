services:
  - type: web
    name: sentinel-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/db/migrate.js && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 1000
