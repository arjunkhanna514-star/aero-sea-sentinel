# nginx/conf.d/sentinel.conf

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # Health check (no auth)
    location = /health {
        return 200 '{"status":"ok","service":"sentinel-gateway"}';
        add_header Content-Type application/json;
    }

    # ── Auth endpoints (strict rate limit) ────────────────
    location ~ ^/api/v1/auth/(login|logout) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass         http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── REST API ───────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass         http://backend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      8 64k;
    }

    # ── AI SSE streaming (disable buffering) ──────────────
    location /api/v1/ai/chat/stream {
        proxy_pass          http://backend_pool;
        proxy_http_version  1.1;
        proxy_set_header    Connection    "";
        proxy_set_header    Host          $host;
        proxy_set_header    X-Real-IP     $remote_addr;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  120s;
        add_header          X-Accel-Buffering no;
        add_header          Cache-Control "no-cache, no-store";
    }

    # ── WebSocket — sub-second telemetry ──────────────────
    location /ws/ {
        proxy_pass          http://backend_pool;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection $connection_upgrade;
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ── Frontend SPA ───────────────────────────────────────
    location / {
        proxy_pass         http://frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_read_timeout 30s;
    }
}
