# docker-compose.override.yml
# Development overrides — mounts source code for hot-reload
# Used automatically by: docker-compose up
# For production only:   docker-compose -f docker-compose.yml up

version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile.dev
    volumes:
      - ./backend/src:/app/src:ro
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    command: ["npx", "nodemon", "src/index.js"]

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src:ro
    environment:
      VITE_API_URL: http://localhost:4000/api/v1
      VITE_WS_URL:  ws://localhost:4000/ws/telemetry

  ai-service:
    environment:
      OLLAMA_HOST:  http://host.docker.internal:11434
      OLLAMA_MODEL: llama3:8b
    volumes:
      - ./ai-service/main.py:/app/main.py:ro
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  simulator:
    environment:
      SIM_INTERVAL_MS: 1000
      SIM_VERBOSE: "true"

  # Expose extra ports in dev
  postgres:
    ports:
      - "5432:5432"
  redis:
    ports:
      - "6379:6379"
